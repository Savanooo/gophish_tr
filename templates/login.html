{{ define "base" }}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="description" content="Gophish Yonetim Girisi" />
    <link rel="shortcut icon" href="/images/favicon.ico">
    <title>{{ .Title }} - Logo B2B</title>
    <style type="text/css">
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; overflow: hidden; }

        .bg {
          position: fixed; inset: 0;
          background-image: url('https://i.ytimg.com/vi/vIGA3MAmC6M/maxresdefault.jpg');
          background-size: cover; background-position: center; z-index: 0;
        }
        .bg-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.18); z-index: 1; }

        .topbar {
          position: fixed; top: 0; left: 0; right: 0; height: 46px;
          background: #1c1c1c; display: flex; align-items: center;
          justify-content: space-between; padding: 0 18px; z-index: 10;
        }
        .topbar-logo { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
        .topbar-user { display: flex; align-items: center; gap: 7px; color: #ccc; font-size: 13px; cursor: default; }
        .topbar-user svg { width: 16px; height: 16px; fill: #aaa; }

        .center {
          position: fixed; inset: 0; display: flex;
          align-items: center; justify-content: center; z-index: 5; padding-top: 46px;
        }

        .card {
          background: rgba(240, 236, 229, 0.93);
          border-radius: 10px; padding: 26px 30px 24px;
          width: 330px; box-shadow: 0 6px 32px rgba(0,0,0,0.35);
        }

        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .card-title { display: flex; align-items: center; gap: 7px; font-size: 15px; font-weight: 600; color: #222; }
        .flags { display: flex; gap: 5px; }
        .flags img { width: 26px; height: 18px; object-fit: cover; border-radius: 2px; border: 1px solid #bbb; }

        .input-wrap { position: relative; margin-bottom: 11px; }
        .input-wrap input {
          width: 100%; padding: 9px 36px 9px 11px;
          border: 1px solid #ccc; border-radius: 5px;
          font-size: 13px; background: #fff; color: #333;
          outline: none; transition: border-color 0.2s;
        }
        .input-wrap input:focus { border-color: #888; }
        .input-wrap input.error { border-color: #e53e3e; background: #fff8f8; }
        .input-wrap input::placeholder { color: #aaa; font-size: 12.5px; }
        .input-wrap .ico {
          position: absolute; right: 10px; top: 50%;
          transform: translateY(-50%); pointer-events: none;
        }

        .error-msg {
          background: #fff0f0; border: 1px solid #f5c6c6;
          color: #c53030; font-size: 12px; border-radius: 5px;
          padding: 8px 11px; margin-bottom: 10px; display: none;
        }
        .error-msg.show { display: block; }

        .flash-wrap .alert {
          background: #fff0f0;
          border: 1px solid #f5c6c6;
          color: #c53030;
          font-size: 12px;
          border-radius: 5px;
          padding: 8px 11px;
          margin-bottom: 10px;
          text-align: left !important;
        }

        .flash-wrap .alert.alert-warning {
          background: #fff7e6;
          border-color: #f0d49b;
          color: #9a6700;
        }

        .flash-wrap .alert.alert-success {
          background: #eefbf3;
          border-color: #b8e6c7;
          color: #1f6f43;
        }

        .flash-wrap .alert.alert-info {
          background: #eef6ff;
          border-color: #bfdcff;
          color: #245c97;
        }

        .btn-login {
          width: 100%; padding: 10px; background: #1c1c1c;
          color: #fff; border: none; border-radius: 5px;
          font-size: 14px; font-weight: 600; cursor: pointer;
          letter-spacing: 0.4px; margin-top: 5px; transition: background 0.2s;
          position: relative; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-login:hover:not(:disabled) { background: #333; }
        .btn-login:disabled { background: #555; cursor: not-allowed; }

        .spinner {
          width: 14px; height: 14px;
          border: 2px solid rgba(255,255,255,0.3);
          border-top-color: #fff; border-radius: 50%;
          animation: spin 0.7s linear infinite;
          display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .forgot { text-align: center; margin-top: 13px; }
        .forgot span { font-size: 12.5px; color: #555; text-decoration: none; }

        @media (max-width: 480px) {
          .card { width: calc(100vw - 28px); padding: 22px 18px 20px; }
          .topbar { padding: 0 12px; }
          .topbar-logo { font-size: 14px; }
          .topbar-user { font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="bg"></div>
<div class="bg-overlay"></div>

<div class="topbar">
    <div class="topbar-logo">Logo B2B</div>
    <div class="topbar-user">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"></path>
        </svg>
        Misafir ▾
    </div>
</div>

<div class="center">
    <div class="card">
        <div class="card-header">
            <div class="card-title">🔑 Kullanıcı Girişi</div>
            <div class="flags">
                <img alt="Türkçe" src="https://flagcdn.com/w40/tr.png" title="Türkçe" />
                <img alt="English" src="https://flagcdn.com/w40/gb.png" title="English" />
            </div>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="flash-wrap">{{template "flashes" .Flashes}}</div>

        <form id="loginForm" action="" method="POST">
            <div class="input-wrap">
                <input id="username" name="username" placeholder="Kullanıcı Adı veya Telefon Numarası" type="text" required autofocus />
                <span class="ico">
                    <svg fill="#aaa" height="14" viewBox="0 0 24 24" width="14">
                        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"></path>
                    </svg>
                </span>
            </div>

            <div class="input-wrap">
                <input id="password" name="password" placeholder="Şifre" type="password" autocomplete="off" required />
                <span class="ico">
                    <svg fill="#aaa" height="14" viewBox="0 0 24 24" width="14">
                        <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"></path>
                    </svg>
                </span>
            </div>

            <input type="hidden" name="csrf_token" value="{{.Token}}" />

            <button class="btn-login" id="loginBtn" type="submit">
                <div class="spinner" id="spinner"></div>
                <span id="btnText">Giriş Yap</span>
            </button>
        </form>

        <div class="forgot"><span>Giriş bilgilerimi unuttum</span></div>
    </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('loginForm');
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const btn = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorMsg = document.getElementById('errorMsg');

    function setError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      username.classList.add('error');
      password.classList.add('error');
    }

    function clearError() {
      errorMsg.textContent = '';
      errorMsg.classList.remove('show');
      username.classList.remove('error');
      password.classList.remove('error');
    }

    username.addEventListener('input', clearError);
    password.addEventListener('input', clearError);

    form.addEventListener('submit', function (e) {
      clearError();

      if (!username.value.trim()) {
        e.preventDefault();
        setError('Kullanıcı adı boş bırakılamaz!');
        username.focus();
        return;
      }

      if (!password.value) {
        e.preventDefault();
        setError('Şifre boş bırakılamaz!');
        password.focus();
        return;
      }

      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Giriş yapılıyor...';
    });
  });
</script>
</body>
</html>
{{ end }}
