<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>Logo B2B</title>
	<style type="text/css">* { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; }

    .bg {
      position: fixed; inset: 0;
      background-image: url('https://i.ytimg.com/vi/vIGA3MAmC6M/maxresdefault.jpg');
      background-size: cover; background-position: center; z-index: 0;
    }
    .bg-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.18); z-index: 1; }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 46px;
      background: #1c1c1c; display: flex; align-items: center;
      justify-content: space-between; padding: 0 18px; z-index: 10;
    }
    .topbar-logo { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
    .topbar-user { display: flex; align-items: center; gap: 7px; color: #ccc; font-size: 13px; cursor: pointer; }
    .topbar-user svg { width: 16px; height: 16px; fill: #aaa; }

    .center {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center; z-index: 5; padding-top: 46px;
    }

    .card {
      background: rgba(240, 236, 229, 0.93);
      border-radius: 10px; padding: 26px 30px 24px;
      width: 330px; box-shadow: 0 6px 32px rgba(0,0,0,0.35);
    }

    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .card-title { display: flex; align-items: center; gap: 7px; font-size: 15px; font-weight: 600; color: #222; }
    .flags { display: flex; gap: 5px; }
    .flags img { width: 26px; height: 18px; object-fit: cover; border-radius: 2px; border: 1px solid #bbb; cursor: pointer; }

    .input-wrap { position: relative; margin-bottom: 11px; }
    .input-wrap input {
      width: 100%; padding: 9px 36px 9px 11px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 13px; background: #fff; color: #333;
      outline: none; transition: border-color 0.2s;
    }
    .input-wrap input:focus { border-color: #888; }
    .input-wrap input.error { border-color: #e53e3e; background: #fff8f8; }
    .input-wrap input::placeholder { color: #aaa; font-size: 12.5px; }
    .input-wrap .ico {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%); pointer-events: none;
    }

    .error-msg {
      background: #fff0f0; border: 1px solid #f5c6c6;
      color: #c53030; font-size: 12px; border-radius: 5px;
      padding: 8px 11px; margin-bottom: 10px; display: none;
    }
    .error-msg.show { display: block; }

    .btn-login {
      width: 100%; padding: 10px; background: #1c1c1c;
      color: #fff; border: none; border-radius: 5px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      letter-spacing: 0.4px; margin-top: 5px; transition: background 0.2s;
      position: relative; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover:not(:disabled) { background: #333; }
    .btn-login:disabled { background: #555; cursor: not-allowed; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .forgot { text-align: center; margin-top: 13px; }
    .forgot a { font-size: 12.5px; color: #555; text-decoration: none; }
    .forgot a:hover { text-decoration: underline; }
	</style>
</head>
<body>
<div class="bg">&nbsp;</div>

<div class="bg-overlay">&nbsp;</div>

<div class="topbar">
<div class="topbar-logo">Logo B2B</div>

<div class="topbar-user"><svg viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"> <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"></path> </svg> Misafir ▾</div>
</div>

<div class="center">
<div class="card">
<div class="card-header">
<div class="card-title">🔑 Kullanıcı Girişi</div>

<div class="flags"><img alt="Türkçe" src="https://flagcdn.com/w40/tr.png" title="Türkçe" /> <img alt="English" src="https://flagcdn.com/w40/gb.png" title="English" /></div>
</div>

<div class="error-msg" id="errorMsg">&nbsp;</div>

<div class="input-wrap"><input id="username" placeholder="Kullanıcı Adı veya Telefon Numarası" type="text" /> <span class="ico"> <svg fill="#aaa" height="14" viewbox="0 0 24 24" width="14"> <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"></path> </svg> </span></div>

<div class="input-wrap"><input id="password" placeholder="Şifre" type="password" /> <span class="ico"> <svg fill="#aaa" height="14" viewbox="0 0 24 24" width="14"> <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"></path> </svg> </span></div>
<button class="btn-login" id="loginBtn" onclick="handleLogin()"><span id="btnText">Giriş Yap</span></button>

<div class="spinner" id="spinner">&nbsp;</div>

<div class="forgot"><a href="#">Giriş bilgilerimi unuttum</a></div>
</div>
</div>
<script>
  /*
   * ── KULLANICI LİSTESİ ──────────────────────────────────────────
   * Gerçek backend için aşağıdaki USERS dizisini kaldır ve
   * fetch() ile kendi API'ına gönder (örnek yorum satırında).
   * ──────────────────────────────────────────────────────────────
   */


  // Enter tuşu ile giriş
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  function setError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('username').classList.add('error');
    document.getElementById('password').classList.add('error');
  }

  function clearError() {
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('username').classList.remove('error');
    document.getElementById('password').classList.remove('error');
  }

  function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const spinner  = document.getElementById('spinner');
    const btnText  = document.getElementById('btnText');

    clearError();

    if (!username) {
      document.getElementById('username').classList.add('error');
      document.getElementById('errorMsg').textContent = 'Kullanıcı adı boş bırakılamaz!';
      document.getElementById('errorMsg').classList.add('show');
      return;
    }
    if (!password) {
      document.getElementById('password').classList.add('error');
      document.getElementById('errorMsg').textContent = 'Şifre boş bırakılamaz!';
      document.getElementById('errorMsg').classList.add('show');
      return;
    }

    // Loading
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Giriş yapılıyor...';

    setTimeout(() => {
      spinner.style.display = 'none';
      btn.disabled = false;
      btnText.textContent = 'Giriş Yap';

      // Ne yazılırsa yazılsın giriş başarılı
      btn.style.background = '#276749';
      btnText.textContent = '✓ Giriş Başarılı';
      // Yönlendirme için: window.location.href = '/dashboard';

      /* ── GERÇEK BACKEND ÖRNEK ──────────────────────────────
      fetch('https://siteniz.com/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) window.location.href = '/dashboard';
        else setError('Kullanıcı adı veya şifre hatalı!');
      })
      .catch(() => setError('Sunucuya bağlanılamadı, tekrar deneyin.'));
      ──────────────────────────────────────────────────────── */

    }, 800);
  }
</script></body>
</html>
